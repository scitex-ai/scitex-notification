name: CLA Assistant

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# owner_login=ywatanabe1989 and default_branch=main match the reusable
# workflow's defaults, so no override needed for those. owner_allowlist is
# overridden below because this repo's prior hardcoded allowlist
# ("bot*,ywatanabe1989,LLEmacs") differs from the reusable default
# ("bot*,ywatanabe1989").

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
